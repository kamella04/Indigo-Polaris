name: Daily YouTube snapshot

on:
  workflow_dispatch:
  schedule:
    # Runs at 23:59 UTC daily. Adjust if you want a different timezone.
    - cron: "59 23 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record snapshot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python record_daily_snapshot.py

      - name: Commit changes (if any)
        run: |
          git status
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_daily_history.json
          git commit -m "Update daily YouTube snapshot"
          git push

